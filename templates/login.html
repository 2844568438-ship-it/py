{% extends "base.html" %}
{% block title %}登录 - 医联通{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-icon large">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </div>
      <h2>登录医联通</h2>
      <p>在线医疗问诊平台</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>手机号</label>
        <input type="text" name="phone" placeholder="请输入手机号" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    <div class="auth-footer">
      <p>还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
      <p class="auth-hint">演示：患者 13800000001 / 医生 13800000002 / 管理员 admin | 密码均为 123456 (管理员 admin123)</p>
    </div>
  </div>
</div>
{% endblock %}
