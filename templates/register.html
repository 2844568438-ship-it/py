{% extends "base.html" %}
{% block title %}注册 - 医联通{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>创建账号</h2>
      <p>注册成为医联通患者用户</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" name="name" placeholder="请输入真实姓名" required>
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" name="phone" placeholder="请输入手机号" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>性别</label>
          <select name="gender">
            <option value="男">男</option>
            <option value="女">女</option>
            <option value="保密">保密</option>
          </select>
        </div>
        <div class="form-group">
          <label>年龄</label>
          <input type="number" name="age" placeholder="年龄" min="1" max="120">
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="至少6位密码" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">注册</button>
    </form>
    <div class="auth-footer">
      <p>已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
    </div>
  </div>
</div>
{% endblock %}
