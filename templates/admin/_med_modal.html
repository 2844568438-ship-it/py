<!-- 药品弹窗复用 -->
{% if not is_edit %}
<div class="modal" id="{{ modal_id }}">
  <div class="modal-content">
    <div class="modal-header">
      <h3>{{ modal_title }}</h3>
      <button class="modal-close" onclick="document.getElementById('{{ modal_id }}').classList.remove('active')">&times;</button>
    </div>
    <form method="POST" action="{{ action }}">
      <div class="form-row">
        <div class="form-group"><label>药品名称</label><input type="text" name="name" required></div>
        <div class="form-group"><label>规格</label><input type="text" name="specification" placeholder="如 0.5g×24粒"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>厂家</label><input type="text" name="manufacturer"></div>
        <div class="form-group"><label>类别</label><select name="category"><option value="西药">西药</option><option value="中药">中药</option><option value="中成药">中成药</option><option value="保健品">保健品</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>价格</label><input type="number" name="price" step="0.01" value="0"></div>
        <div class="form-group"><label>库存</label><input type="number" name="stock" value="0"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">保存</button>
    </form>
  </div>
</div>
{% else %}
<div class="modal" id="{{ modal_id }}">
  <div class="modal-content">
    <div class="modal-header">
      <h3>{{ modal_title }}</h3>
      <button class="modal-close" onclick="document.getElementById('{{ modal_id }}').classList.remove('active')">&times;</button>
    </div>
    <form id="editMedForm" method="POST">
      <div class="form-row">
        <div class="form-group"><label>药品名称</label><input type="text" name="name" id="editMedName" required></div>
        <div class="form-group"><label>规格</label><input type="text" name="specification" id="editMedSpec"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>厂家</label><input type="text" name="manufacturer" id="editMedMfr"></div>
        <div class="form-group"><label>类别</label><select name="category" id="editMedCat"><option value="西药">西药</option><option value="中药">中药</option><option value="中成药">中成药</option><option value="保健品">保健品</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>价格</label><input type="number" name="price" step="0.01" id="editMedPrice"></div>
        <div class="form-group"><label>库存</label><input type="number" name="stock" id="editMedStock"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">保存</button>
    </form>
  </div>
</div>
{% endif %}
