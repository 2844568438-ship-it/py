<!-- 科室弹窗复用 -->
<div class="modal" id="{{ modal_id }}">
  <div class="modal-content">
    <div class="modal-header">
      <h3>{{ modal_title }}</h3>
      <button class="modal-close" onclick="document.getElementById('{{ modal_id }}').classList.remove('active')">&times;</button>
    </div>
    <form method="POST" action="{{ action }}">
      <div class="form-group">
        <label>科室名称</label>
        <input type="text" name="name" required placeholder="如：内科、外科、儿科...">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea name="description" rows="2" placeholder="科室简介..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">保存</button>
    </form>
  </div>
</div>
